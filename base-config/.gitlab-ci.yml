# ---------------------------------------------------------------------------
# Intersight Base Config — GitLab CI Pipeline
#
# Required GitLab CI/CD Variables (Settings → CI/CD → Variables):
#
#   INTERSIGHT_API_KEY_ID   — Intersight API key ID            (masked)
#   INTERSIGHT_SECRET_KEY   — Secret key file content          (file type)
#   TF_VARS_FILE            — Full terraform.tfvars content    (file type)
# ---------------------------------------------------------------------------

default:
  image: hashicorp/terraform:1.7
  before_script:
    - apk add --no-cache bash
    - terraform --version

variables:
  TF_IN_AUTOMATION: "true"
  TF_CLI_ARGS: "-no-color"

stages:
  - validate
  - plan
  - apply

# ---------------------------------------------------------------------------
# Setup: write tfvars and secret key from CI variables
# ---------------------------------------------------------------------------
.setup: &setup
  - cp "$TF_VARS_FILE" terraform.tfvars
  - cp "$INTERSIGHT_SECRET_KEY" secret_key.txt
  - |
    cat >> terraform.tfvars <<EOF
    intersight_api_key_id      = "$INTERSIGHT_API_KEY_ID"
    intersight_secret_key_file = "secret_key.txt"
    EOF
  - terraform init -input=false

# ---------------------------------------------------------------------------
# Validate — runs on every push
# ---------------------------------------------------------------------------
validate:
  stage: validate
  script:
    - terraform init -backend=false -input=false
    - terraform validate
  rules:
    - if: '$CI_PIPELINE_SOURCE == "push"'
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'

# ---------------------------------------------------------------------------
# Plan — runs on every push and on schedule (drift detection)
# ---------------------------------------------------------------------------
plan:
  stage: plan
  script:
    - *setup
    - terraform plan -detailed-exitcode -out=tfplan
  artifacts:
    paths:
      - base-config/tfplan
    expire_in: 1 day
  rules:
    - if: '$CI_PIPELINE_SOURCE == "push"'
    - if: '$CI_PIPELINE_SOURCE == "schedule"'
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'

# ---------------------------------------------------------------------------
# Drift Check — scheduled nightly, fails pipeline if drift detected
# ---------------------------------------------------------------------------
drift_check:
  stage: plan
  script:
    - *setup
    - |
      terraform plan -detailed-exitcode
      EXIT=$?
      if [ $EXIT -eq 2 ]; then
        echo "DRIFT DETECTED — Intersight config has diverged from desired state."
        echo "Run the 'enforce_config' job to correct it."
        exit 1
      elif [ $EXIT -eq 1 ]; then
        echo "Terraform plan failed."
        exit 1
      else
        echo "No drift detected — Intersight config is in sync."
      fi
  rules:
    - if: '$CI_PIPELINE_SOURCE == "schedule"'
  allow_failure: false

# ---------------------------------------------------------------------------
# Apply — manual trigger only (enforce desired state)
# ---------------------------------------------------------------------------
enforce_config:
  stage: apply
  script:
    - *setup
    - terraform apply -auto-approve -input=false
  environment:
    name: intersight-base-config
  rules:
    - if: '$CI_PIPELINE_SOURCE == "push" && $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
      when: manual
    - if: '$CI_PIPELINE_SOURCE == "schedule"'
      when: manual
    - if: '$CI_PIPELINE_SOURCE == "web"'
      when: manual
  allow_failure: false
