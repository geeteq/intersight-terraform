# ---------------------------------------------------------------------------
# Intersight Base Config — Multi-Site GitLab CI Pipeline
#
# Required GitLab CI/CD Variables (Settings → CI/CD → Variables):
#
#   INTERSIGHT_API_KEY_ID   — Intersight API key ID            (masked)
#   INTERSIGHT_SECRET_KEY   — Secret key file content          (file type)
#
# Per-site tfvars files live in sites/<site>.tfvars (committed to repo).
# Sensitive values (api key, secret key) are injected at runtime.
# Terraform state is managed per-site via GitLab's managed state backend.
# ---------------------------------------------------------------------------

default:
  image: hashicorp/terraform:1.7
  before_script:
    - apk add --no-cache bash
    - terraform --version

variables:
  TF_IN_AUTOMATION: "true"
  TF_CLI_ARGS: "-no-color"

stages:
  - validate
  - plan
  - apply

# ---------------------------------------------------------------------------
# Reusable setup — injects secrets into tfvars, inits with per-site state
# ---------------------------------------------------------------------------
.setup: &setup
  - cp "$INTERSIGHT_SECRET_KEY" secret_key.txt
  - cp "sites/${SITE}.tfvars" site.auto.tfvars
  - |
    cat >> site.auto.tfvars <<EOF
    intersight_api_key_id      = "$INTERSIGHT_API_KEY_ID"
    intersight_secret_key_file = "secret_key.txt"
    EOF
  - |
    terraform init -input=false \
      -backend-config="address=${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/terraform/state/${SITE}" \
      -backend-config="lock_address=${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/terraform/state/${SITE}/lock" \
      -backend-config="unlock_address=${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/terraform/state/${SITE}/lock" \
      -backend-config="username=gitlab-ci-token" \
      -backend-config="password=${CI_JOB_TOKEN}" \
      -backend-config="lock_method=POST" \
      -backend-config="unlock_method=DELETE" \
      -backend-config="retry_wait_min=5"

# ---------------------------------------------------------------------------
# Job templates
# ---------------------------------------------------------------------------
.plan_job:
  stage: plan
  script:
    - *setup
    - terraform plan -var-file="site.auto.tfvars" -detailed-exitcode -out=tfplan
  artifacts:
    paths:
      - base-config/tfplan
    expire_in: 1 day

.drift_job:
  stage: plan
  script:
    - *setup
    - |
      set +e
      terraform plan -var-file="site.auto.tfvars" -detailed-exitcode
      EXIT=$?
      set -e
      if [ $EXIT -eq 2 ]; then
        echo "DRIFT DETECTED on site: $SITE — run enforce job to correct."
        exit 1
      elif [ $EXIT -eq 1 ]; then
        exit 1
      else
        echo "No drift — $SITE is in sync."
      fi
  rules:
    - if: '$CI_PIPELINE_SOURCE == "schedule"'
  allow_failure: false

.apply_job:
  stage: apply
  script:
    - *setup
    - terraform apply -var-file="site.auto.tfvars" -auto-approve -input=false
  when: manual
  allow_failure: false

# ---------------------------------------------------------------------------
# Validate — runs on every push (no secrets needed)
# ---------------------------------------------------------------------------
validate:
  stage: validate
  script:
    - terraform init -backend=false -input=false
    - terraform validate
  rules:
    - if: '$CI_PIPELINE_SOURCE == "push"'
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'

# ---------------------------------------------------------------------------
# Site A
# ---------------------------------------------------------------------------
plan:site-a:
  extends: .plan_job
  variables:
    SITE: site-a
  environment:
    name: intersight/site-a
  rules:
    - if: '$CI_PIPELINE_SOURCE == "push" && $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
    - if: '$CI_PIPELINE_SOURCE == "web"'

drift:site-a:
  extends: .drift_job
  variables:
    SITE: site-a
  environment:
    name: intersight/site-a

enforce:site-a:
  extends: .apply_job
  variables:
    SITE: site-a
  environment:
    name: intersight/site-a
  rules:
    - if: '$CI_PIPELINE_SOURCE == "push" && $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
      when: manual
    - if: '$CI_PIPELINE_SOURCE == "schedule"'
      when: manual
    - if: '$CI_PIPELINE_SOURCE == "web"'
      when: manual

# ---------------------------------------------------------------------------
# Site B
# ---------------------------------------------------------------------------
plan:site-b:
  extends: .plan_job
  variables:
    SITE: site-b
  environment:
    name: intersight/site-b
  rules:
    - if: '$CI_PIPELINE_SOURCE == "push" && $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
    - if: '$CI_PIPELINE_SOURCE == "web"'

drift:site-b:
  extends: .drift_job
  variables:
    SITE: site-b
  environment:
    name: intersight/site-b

enforce:site-b:
  extends: .apply_job
  variables:
    SITE: site-b
  environment:
    name: intersight/site-b
  rules:
    - if: '$CI_PIPELINE_SOURCE == "push" && $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
      when: manual
    - if: '$CI_PIPELINE_SOURCE == "schedule"'
      when: manual
    - if: '$CI_PIPELINE_SOURCE == "web"'
      when: manual
